server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?currentSchema=portfolio_service
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: portfolio_service

  # ── Kafka consumer (stock.prices, produced by stock-service) ─────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: portfolio-service-group
      auto-offset-reset: latest

kafka:
  topic:
    stock-prices: stock.prices

# ── SSE (Server-Sent Events) ───────────────────────────────────────────────────
portfolio:
  stream:
    emitter-timeout-ms: 300000

# threshold-service base URL fallback when not resolved via Eureka load-balancer alias
threshold-service:
  name: threshold-service
