# Shared defaults served to every service that fetches config (merged with <service-name>.yml).
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# JWT — shared secret so every service can validate tokens issued by user-service.
# IMPORTANT: replace with a strong random value before deploying to production.
jwt:
  secret: WW91U2hvdWxkQ2hhbmdlVGhpc0tleUluUHJvZHVjdGlvbkVudmlyb25tZW50IQ==
  expiration-ms: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
    filter: true
    display-request-duration: true
    deep-linking: true
  default-produces-media-type: application/json
