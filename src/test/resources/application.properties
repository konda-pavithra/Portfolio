# ── Database — H2 in-memory replaces PostgreSQL ───────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=WW91U2hvdWxkQ2hhbmdlVGhpc0tleUluUHJvZHVjdGlvbkVudmlyb25tZW50IQ==
jwt.expiration-ms=86400000

# ── Kafka — beans created but listeners do not auto-start ─────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=portfolio-test-group
spring.kafka.consumer.auto-offset-reset=latest
# Prevent KafkaAdmin from failing the context when the broker is unreachable
spring.kafka.admin.fail-fast=false
# Don't auto-start @KafkaListener containers during context load
spring.kafka.listener.auto-startup=false
kafka.topic.stock-prices=stock.prices.test
kafka.topic.partitions=1
kafka.topic.replication-factor=1

# ── RabbitMQ — don't auto-start @RabbitListener containers ───────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.auto-startup=false

# ── Mail — dummy SMTP (no connection made until first send) ───────────────────
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
alert.mail.from-name=Test Alerts

# ── Stock refresh — huge delay so scheduled tasks don't fire during tests ─────
stock.refresh.interval-ms=999999999
stock.refresh.initial-delay-ms=999999999
stock.client.connect-timeout-ms=5000
stock.client.read-timeout-ms=5000

# ── Alert scheduler ───────────────────────────────────────────────────────────
alert.check-interval-ms=999999999
alert.check-initial-delay-ms=999999999
alert.cooldown-hours=4

# ── SSE ───────────────────────────────────────────────────────────────────────
portfolio.stream.emitter-timeout-ms=300000

# ── SpringDoc ─────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-produces-media-type=application/json

# Allow @TestConfiguration beans to override production beans of the same name
spring.main.allow-bean-definition-overriding=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.example.portfolio=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
